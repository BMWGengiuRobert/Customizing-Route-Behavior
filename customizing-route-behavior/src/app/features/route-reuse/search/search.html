<mat-card>
    <mat-card-header>
        <mat-card-title> <mat-icon>search</mat-icon> Deep Search</mat-card-title>
    </mat-card-header>
    <mat-card-content style="margin-top: 15px;">
        <p>Type something below, click the book, then hit your browser's BACK button!</p>

        <mat-form-field appearance="outline" style="width: 100%;">
            <mat-label>Search Query</mat-label>
            <input matInput [(ngModel)]="searchTerm" placeholder="Try: ISBN Product" />
        </mat-form-field>

        @if (searchTerm) {
        <div style="margin-top: 15px; padding: 10px; background: #e3f2fd; border-radius: 4px;">
            Found 1 result for: <strong>{{ searchTerm }}</strong>
            <br><br>
            <button mat-raised-button color="accent" routerLink="/isbn-978111111111">
                View Product (ISBN: 978111111111)
            </button>
        </div>
        }
    </mat-card-content>
</mat-card>
